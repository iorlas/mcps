x-hub: &hub
  image: ghcr.io/iorlas/joi-hub:${IMAGE_TAG}
  expose:
    - "8000"
  networks:
    - dokploy-network
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8000/ | grep -qE '200|404|406'"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

services:
  # ── Gateway (public, handles auth + federation) ──
  gateway:
    <<: *hub
    command: ["sh", "-c", "uv run uvicorn mcps.gateway:app --host 0.0.0.0 --port 8000"]
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BASE_URL: https://hub.shen.iorlas.net
      TRANSMISSION_MCP_URL: http://hub-transmission:8000/mcp/
      JACKETT_MCP_URL: http://hub-jackett:8000/mcp/
      STORAGE_MCP_URL: http://hub-storage:8000/mcp/
      TMDB_MCP_URL: http://hub-tmdb:8000/mcp/
      OPENVIKING_URL: http://openviking:1933
      OPENVIKING_API_KEY: hub-internal-only
    depends_on:
      hub-transmission:
        condition: service_healthy
      hub-jackett:
        condition: service_healthy
      hub-storage:
        condition: service_healthy
      hub-tmdb:
        condition: service_healthy
      openviking:
        condition: service_healthy
    networks:
      - dokploy-network
      - hub-internal
    labels:
      traefik.enable: "true"
      traefik.http.routers.hub.rule: Host(`hub.shen.iorlas.net`)
      traefik.http.routers.hub.entrypoints: websecure
      traefik.http.routers.hub.tls.certresolver: letsencrypt
      traefik.http.services.hub.loadbalancer.server.port: "8000"

  # ── Hub MCP servers (internal, no auth) ──
  hub-transmission:
    <<: *hub
    command: ["sh", "-c", "uv run uvicorn mcps.server:transmission --host 0.0.0.0 --port 8000"]
    environment:
      TRANSMISSION_HOST: torrents.segaa.keenetic.link
      TRANSMISSION_PORT: "443"
      TRANSMISSION_PATH: /transmission/rpc
      TRANSMISSION_USER: ${TRANSMISSION_USER}
      TRANSMISSION_PASS: ${TRANSMISSION_PASS}
      TRANSMISSION_SSL: "true"

  hub-jackett:
    <<: *hub
    command: ["sh", "-c", "uv run uvicorn mcps.server:jackett --host 0.0.0.0 --port 8000"]
    environment:
      JACKETT_URL: http://jackett:9117
      JACKETT_API_KEY: ${JACKETT_API_KEY}
    depends_on:
      jackett:
        condition: service_healthy

  hub-storage:
    <<: *hub
    command: ["sh", "-c", "uv run uvicorn mcps.server:storage --host 0.0.0.0 --port 8000"]
    environment:
      WEBDAV_URL: ${WEBDAV_URL}
      WEBDAV_USER: ${WEBDAV_USER}
      WEBDAV_PASS: ${WEBDAV_PASS}

  hub-tmdb:
    <<: *hub
    command: ["sh", "-c", "uv run uvicorn mcps.server:tmdb --host 0.0.0.0 --port 8000"]
    environment:
      TMDB_API_KEY: ${TMDB_API_KEY}

  # ── Jackett (torrent indexer) ──
  jackett:
    image: linuxserver/jackett:latest
    pull_policy: always
    volumes:
      - jackett-config:/config
    expose:
      - "9117"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9117"]
      interval: 30s
      timeout: 3s
      start_period: 10s
    networks:
      - dokploy-network
    labels:
      tailscale: "true"
      traefik.enable: "true"
      traefik.http.routers.hub-jackett-admin.rule: Host(`jackett.ts.shen.iorlas.net`)
      traefik.http.routers.hub-jackett-admin.entrypoints: web
      traefik.http.services.hub-jackett-admin.loadbalancer.server.port: "9117"
    restart: unless-stopped

  # ── OpenViking (household memory) ──
  openviking:
    image: ghcr.io/volcengine/openviking:main
    pull_policy: always
    command:
      - sh
      - -c
      - |
        cat > /app/ov.conf <<'CONF'
        {
          "server": {"host": "0.0.0.0", "port": 1933, "root_api_key": "hub-internal-only"},
          "storage": {"workspace": "/app/data"},
          "vlm": {
            "provider": "openai",
            "api_base": "http://litellm:4000/v1",
            "api_key": "no-auth",
            "model": "llama3.2:3b"
          },
          "embedding": {
            "dense": {
              "provider": "openai",
              "api_base": "http://litellm:4000/v1",
              "api_key": "no-auth",
              "model": "nomic-embed-text",
              "dimension": 1536
            }
          }
        }
        CONF
        exec openviking-server
    volumes:
      - openviking-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dokploy-network
      - hub-internal
    restart: unless-stopped

volumes:
  jackett-config:
  openviking-data:

networks:
  dokploy-network:
    external: true
  hub-internal:
    internal: true
