binds:
- port: 3000
  listeners:
  - routes:
    - backends:
      - mcp:
          targets:
          - name: reelm_torrents
            mcp:
              host: http://reelm-transmission:8000/mcp/
          - name: reelm_search
            mcp:
              host: http://reelm-jackett:8000/mcp/
          - name: reelm_storage
            mcp:
              host: http://reelm-storage:8000/mcp/
      matches:
      - path:
          exact: /mcp
      - path:
          exact: /.well-known/oauth-protected-resource/mcp
      policies:
        cors:
          allowOrigins: ["*"]
          allowHeaders: ["*"]
          exposeHeaders: ["Mcp-Session-Id"]
        mcpAuthentication:
          mode: strict
          issuer: https://dev-ombhlv0g10x6js0j.us.auth0.com/
          audiences:
          - https://reelm.shen.iorlas.net
          jwks:
            url: https://dev-ombhlv0g10x6js0j.us.auth0.com/.well-known/jwks.json
          provider:
            auth0: {}
          resourceMetadata:
            resource: https://reelm.shen.iorlas.net/mcp
            scopesSupported:
            - openid
            - profile
            bearerMethodsSupported:
            - header
