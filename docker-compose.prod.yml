x-reelm: &reelm
  image: ghcr.io/iorlas/reelm:${IMAGE_TAG}
  expose:
    - "8000"
  networks:
    - dokploy-network
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8000/ | grep -qE '200|404|406'"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

services:
  # ── Gateway (public, handles auth + federation) ──
  gateway:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.gateway:app --host 0.0.0.0 --port 8000"]
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BASE_URL: https://reelm.shen.iorlas.net
      TRANSMISSION_MCP_URL: http://reelm-transmission:8000/mcp/
      JACKETT_MCP_URL: http://reelm-jackett:8000/mcp/
      STORAGE_MCP_URL: http://reelm-storage:8000/mcp/
      TMDB_MCP_URL: http://reelm-tmdb:8000/mcp/
      OPENMEMORY_URL: http://mem0-api:8000
    depends_on:
      reelm-transmission:
        condition: service_healthy
      reelm-jackett:
        condition: service_healthy
      reelm-storage:
        condition: service_healthy
      reelm-tmdb:
        condition: service_healthy
      mem0-api:
        condition: service_healthy
    networks:
      - dokploy-network
      - reelm-internal
    labels:
      traefik.enable: "true"
      traefik.http.routers.reelm.rule: Host(`reelm.shen.iorlas.net`)
      traefik.http.routers.reelm.entrypoints: websecure
      traefik.http.routers.reelm.tls.certresolver: letsencrypt
      traefik.http.services.reelm.loadbalancer.server.port: "8000"

  # ── Reelm MCP servers (internal, no auth) ──
  reelm-transmission:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:transmission --host 0.0.0.0 --port 8000"]
    environment:
      TRANSMISSION_HOST: torrents.segaa.keenetic.link
      TRANSMISSION_PORT: "443"
      TRANSMISSION_PATH: /transmission/rpc
      TRANSMISSION_USER: ${TRANSMISSION_USER}
      TRANSMISSION_PASS: ${TRANSMISSION_PASS}
      TRANSMISSION_SSL: "true"

  reelm-jackett:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:jackett --host 0.0.0.0 --port 8000"]
    environment:
      JACKETT_URL: http://jackett:9117
      JACKETT_API_KEY: ${JACKETT_API_KEY}
    depends_on:
      jackett:
        condition: service_healthy

  reelm-storage:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:storage --host 0.0.0.0 --port 8000"]
    environment:
      WEBDAV_URL: ${WEBDAV_URL}
      WEBDAV_USER: ${WEBDAV_USER}
      WEBDAV_PASS: ${WEBDAV_PASS}

  reelm-tmdb:
    <<: *reelm
    command: ["sh", "-c", "uv run uvicorn mcps.server:tmdb --host 0.0.0.0 --port 8000"]
    environment:
      TMDB_API_KEY: ${TMDB_API_KEY}

  # ── Jackett (torrent indexer) ──
  jackett:
    image: linuxserver/jackett:latest
    volumes:
      - jackett-config:/config
    expose:
      - "9117"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9117"]
      interval: 30s
      timeout: 3s
      start_period: 10s
    networks:
      - dokploy-network
    labels:
      tailscale: "true"
      traefik.enable: "true"
      traefik.http.routers.reelm-jackett-admin.rule: Host(`jackett.ts.shen.iorlas.net`)
      traefik.http.routers.reelm-jackett-admin.entrypoints: web
      traefik.http.services.reelm-jackett-admin.loadbalancer.server.port: "9117"
    restart: unless-stopped

  # ── mem0 infrastructure (internal, no external access) ──
  mem0-db:
    image: ankane/pgvector:v0.5.1
    pull_policy: always
    shm_size: "128mb"
    environment:
      POSTGRES_USER: ${OPENMEMORY_POSTGRES_USER}
      POSTGRES_PASSWORD: ${OPENMEMORY_POSTGRES_PASSWORD}
      POSTGRES_DB: mem0
    volumes:
      - mem0-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OPENMEMORY_POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - reelm-internal
    restart: unless-stopped

  mem0-neo4j:
    image: neo4j:5.26.4
    pull_policy: always
    environment:
      NEO4J_AUTH: neo4j/${OPENMEMORY_POSTGRES_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    volumes:
      - mem0-neo4j:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:7474 -O /dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - reelm-internal
    restart: unless-stopped

  mem0-api:
    image: mem0/mem0-api-server:latest
    pull_policy: always
    environment:
      OPENAI_API_KEY: no-auth
      OPENAI_BASE_URL: http://litellm:4000/v1
      POSTGRES_HOST: mem0-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: mem0
      POSTGRES_USER: ${OPENMEMORY_POSTGRES_USER}
      POSTGRES_PASSWORD: ${OPENMEMORY_POSTGRES_PASSWORD}
      NEO4J_URI: bolt://mem0-neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${OPENMEMORY_POSTGRES_PASSWORD}
    depends_on:
      mem0-db:
        condition: service_healthy
      mem0-neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network
      - reelm-internal
    restart: unless-stopped

volumes:
  jackett-config:
  mem0-pgdata:
  mem0-neo4j:

networks:
  dokploy-network:
    external: true
  reelm-internal:
    internal: true
